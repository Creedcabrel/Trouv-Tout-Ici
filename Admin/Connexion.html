<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion admin — MarketPlace</title>

  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-glass">
    <div class="container py-2">
      <a class="navbar-brand fw-semibold" href="../accueil.html">
        <span class="text-primary">TrouvTout</span>Ici
        <span class="text-secondary fw-normal">/ Admin</span>
      </a>
      <a class="btn btn-outline-secondary" href="../accueil.html">Retour au site</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="bg-white rounded-4 border p-4 p-md-5">
          <h1 class="h4 fw-semibold mb-1">Connexion admin</h1>
          <p class="text-secondary mb-4">Accès réservé à l'équipe d'administration.</p>

          <form>
            <div class="mb-3">
              <input type="email" class="form-control form-control-lg" id="adminEmail" 
                     placeholder="Email professionnel" required>
            </div>

            <div class="mb-3">
              <input type="password" class="form-control form-control-lg" id="adminPassword" 
                     placeholder="Mot de passe" minlength="6" required>
            </div>

            <div class="d-grid gap-2">
              <a href="tableau-de-bord-admin.html" class="btn btn-primary btn-lg">Se connecter</a>
              <a href="inscription-admin.html" class="btn btn-outline-primary btn-lg">Créer un compte</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Pied de page minimal -->
  <footer class="border-top mt-5">
    <div class="container py-3">
      <div class="text-center text-secondary small">
        © 2026 MarketPlace — Espace admin 
      </div>
    </div>
  </footer>

  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
