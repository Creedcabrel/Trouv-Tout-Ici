<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription admin — MarketPlace</title>

  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-glass">
    <div class="container py-2">
      <a class="navbar-brand fw-semibold" href="../accueil.html">
        <span class="text-primary">Market</span>Place
        <span class="text-secondary fw-normal">/ Admin</span>
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="../Admin/Connexion.html">J'ai déjà un compte</a>
        <a class="btn btn-outline-secondary" href="../accueil.html">Retour au site</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        <div class="bg-white rounded-4 border p-4 p-md-5">
          <h1 class="h4 fw-semibold mb-1">Inscription administrateur</h1>

          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="adminNom" class="form-label">Nom complet</label>
                <input type="text" class="form-control form-control-lg" id="adminNom" placeholder="Nom et prénom" required>
              </div>

              <div class="col-md-6">
                <label for="adminRole" class="form-label">Rôle</label>
                <select class="form-select form-select-lg" id="adminRole" required>
                  <option value="" selected disabled>Choisir...</option>
                  <option>Administrateur</option>
                  <option>Support</option>
                  <option>Finance</option>
                </select>
              </div>

              <div class="col-12">
                <label for="adminEmail" class="form-label">Email professionnel</label>
                <input type="email" class="form-control form-control-lg" id="adminEmail" placeholder="admin@demo.com" required>
              </div>

              <div class="col-md-6">
                <label for="adminTelephone" class="form-label">Téléphone</label>
                <input type="tel" class="form-control form-control-lg" id="adminTelephone" placeholder="+229 01 23 45 67" pattern="[0-9+\s]{10,}" title="Numéro de téléphone valide">
              </div>

              <div class="col-md-6">
                <label for="adminCode" class="form-label">Code d'accès admin</label>
                <input type="text" class="form-control form-control-lg" id="adminCode" value="ADMIN-2026" readonly>
              </div>

              <div class="col-md-6">
                <label for="adminMdp" class="form-label">Mot de passe</label>
                <input type="password" class="form-control form-control-lg" id="adminMdp" placeholder="••••••••" minlength="6" required>
              </div>

              <div class="col-md-6">
                <label for="adminMdpConfirmation" class="form-label">Confirmer le mot de passe</label>
                <input type="password" class="form-control form-control-lg" id="adminMdpConfirmation" placeholder="••••••••" required>
              </div>
            </div>

            <div class="d-grid gap-2 mt-4">
              <a href="connexion-admin.html" class="btn btn-primary btn-lg">Créer le compte</a>
              <a href="../accueil.html" class="btn btn-outline-secondary btn-lg">Annuler</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Pied de page minimal -->
  <footer class="border-top mt-5">
    <div class="container py-3">
      <div class="text-center text-secondary small">
        © 2026 MarketPlace — Espace admin 
      </div>
    </div>
  </footer>

  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
